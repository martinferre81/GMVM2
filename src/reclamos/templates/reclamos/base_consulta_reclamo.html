<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Gestor Municipalidad de Valle Maria{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

    <style>
        body { background-color: #f4f6f9; }

        /* SIDEBAR */
        .sidebar {
            min-height: 100vh;
            background-color: #1f2933;
            color: white;
            width: 16.666%;
            transition: transform 0.3s ease, width 0.3s ease;
        }

        .sidebar a { color: #cfd8dc; text-decoration: none; }
        .sidebar a:hover { color: #ffffff; }
        .sidebar-title { font-weight: bold; font-size: 1.2rem; }

        /* SIDEBAR OCULTO */
        .sidebar-collapsed {
            transform: translateX(-100%);
            width: 0;
            padding: 0 !important;
            overflow: hidden;
        }

        /* CONTENIDO */
        .content {
            padding: 20px;
            transition: width 0.3s ease;
        }

        .content-expanded {
            width: calc(100% - 16.666%);
        }

        footer { background-color: #1f2933; color: #cfd8dc; }
        footer a { color: #cfd8dc; }

        /* SUBMENU CONFIGURACIÓN */
        #config-menu {
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .config-collapsed {
            max-height: 0;
        }

        .config-expanded {
            max-height: 300px; /* suficiente para los ítems */
        }

        #config-arrow {
            transition: transform 0.3s ease;
        }

        .arrow-rotated {
            transform: rotate(180deg);
        }

         .badge-custom {   /* estilo para el badge de la tabla de reclamos */
            display: inline-block;
            width: 80px;
            text-align: center;
         }

        .fila-seleccionada td{
            color:#FFFFFF;
            background-color:#656C7D !important;
        }
         .tabla-historial td{
            font-size: 13px;
            padding: 4px 6px;
            line-height: 1.2;
        }

        .tabla-historial th{
            font-size: 13px;
            padding: 5px;
        }

        .tabla-historial{
            width: auto;
            table-layout: auto;
        }

        .tabla-historial thead th{
            position: sticky;
            top: 0;
            background: white;
            z-index: 1;
        }

        .tabla-historial th, .tabla-historial td
        {
            white-space: nowrap;
        }

        .tabla-historial td:nth-child(5),
        .tabla-historial th:nth-child(5){
            max-width: 300px;
            white-space: normal;
            word-break: break-word;
        }
        .modal-historial{
            max-width: fit-content;
        }
        .modal-historial-body{
            max-height: 60vh;
            overflow-y: auto;
        }
        .fila-reclamo td {
            padding: 0.25rem 0.5rem; /* menos padding vertical y horizontal */
            font-size: 0.85rem;      /* fuente más pequeña */
            line-height: 1.1;        /* ajusta la altura de línea */
        }
        .alerta-demora {
            animation: parpadeo 1.5s infinite;
        }

        @keyframes parpadeo {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
        .card-dashboard {
            min-height: 90px;
        }
        .tabla-reclamos-container{
            height:40vh;
            overflow-y:auto;
            border:1px solid #dee2e6;
        }

        /* deja el header fijo */
        .tabla-reclamos-container thead th{
            position:sticky;
            top:0;
            background:#212529;
            color:white;
            z-index:2;
        }
        .card canvas{
            height:260px !important;
        }

        .panel-lateral{
            background:#000;
            color:white;
        }

        .panel-lateral .card-header{
            background:#000;
            color:white;
            border-bottom:1px solid #444;
        }

        .panel-lateral label{
            color:white;
        }

        .panel-lateral .form-control,
        .panel-lateral .form-select{
            background:#f8f9fa;
        }

        .panel-lateral .btn{
            background:white;
            color:#0d6efd;
            border:none;
            font-weight:500;
        }

        .panel-lateral .btn:hover{
            background:#e9ecef;
        }


    </style>
</head>

<body>

<div class="container mt-5 contenedor-central">

    {% block content %}
    {% endblock %}

</div>

<footer class="text-center py-3 mt-5 bg-dark text-light">
    Desarrollado por <strong>MEF Sistemas</strong> © 2026
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>




<!-- FOOTER -->
<footer class="text-center py-3 mt-4">
    <div>
        Desarrollado por <strong>MEF Sistemas</strong> © 2026
    </div>
    <div>
        <a href="#"><i class="fa-brands fa-facebook"></i></a>
        <a href="#" class="ms-2"><i class="fa-brands fa-instagram"></i></a>
        <a href="#" class="ms-2"><i class="fa-brands fa-twitter"></i></a>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

{% block scripts %}{% endblock %}
</body>
</html>
