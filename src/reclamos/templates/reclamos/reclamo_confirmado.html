<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reclamo enviado</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-body text-center">
            <h3 class="text-success mb-3">
                ✔ Reclamo enviado correctamente
            </h3>
            <p class="lead">
                Número de reclamo
            </p>
            <h2 class="fw-bold">
                {{ reclamo.numero }}
            </h2>
            <p class="mt-3 text-muted">
                Guarde este número para realizar el seguimiento.
            </p>
            <div class="mt-4">
                <a href="{% url 'portal_root' %}"  class="btn btn-primary">
                    Consultar reclamo
                </a>
                <a href="{% url 'portal_root' %}" class="btn btn-secondary">
                    Volver al portal
                </a>
            </div>
        </div>
    </div>

</div>

</body>

</html>
