{% block sidebar_right %}
    <!-- FRAME FILTROS -->
<div class="card shadow-sm panel-lateral">
    <div class="card-header fw-bold">
        <i class="fa-solid fa-filter"></i> Filtros
    </div>

    <div class="card-body">
        <form method="get">

            <div class="mb-2">
                <label class="form-label">Buscar</label>
                <input type="text" id="busquedaGeneral" class="form-control form-control-sm"
                       placeholder="ID, vecino, título, usuario...">
            </div>

            <div class="mb-2">
                <label class="form-label">Fecha creación</label>
                <input type="date" class="form-control form-control-sm"
                       name="fecha_desde" value="{{ fecha_desde }}">
            </div>

            <div class="mb-2">
                <label class="form-label">Fecha hasta</label>
                <input type="date" class="form-control form-control-sm"
                       name="fecha_hasta" value="{{ fecha_hasta}}">
            </div>

            <div class="mb-3">
                <label class="form-label">Tipo reclamo</label>
                <select class="form-select form-select-sm" name="tipo">
                   <option value="">Todos</option>
                        {% for t in tipos %}
                        <option value="{{t.id}}" {% if request.GET.tipo == t.id|stringformat:"s" %}selected{% endif %}>
                        {{t.nombre}}
                        </option>
                        {% endfor %}
                </select>
            </div>

            <div class="mb-2">
                <label class="form-label">Estado</label>
                <select name="estado" class="form-select">
                    <option value="">Todos</option>
                    {% for e in estados %}
                       {% with eid=e.id|stringformat:"s" %}
                            <option value="{{ e.id }}"
                            {% if request.GET.estado == eid %}selected{% endif %}>
                                {{ e.nombre }}
                            </option>
                            {% endwith %}
                    {% endfor %}
                </select>
            </div>

            <div class="mb-2">
                <label class="form-label">Vecino</label>
                <select name="vecino" class="form-select form-select-sm select2-sidebar">
                    <option value="">Todos</option>
                    {% for v in vecinos %}
                    <option value="{{v.id}}"
                        {% if request.GET.vecino == v.id|stringformat:"s" %}selected{% endif %}>
                        {{v}}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <button class="btn btn-primary btn-sm w-100">
                <i class="fa-solid fa-magnifying-glass"></i> Aplicar filtros
            </button>

        </form>
    </div>
</div>
<!--FIN  FRAME FILTROS -->
<!-- FRAME ACCIONES -->
<div class="card mb-3 shadow-sm panel-lateral">
    <div class="card-header fw-bold">
        <i class="fa-solid fa-gears"></i> Acciones
    </div>
    <div class="card-body d-grid gap-2">

        <button class="btn btn-success btn-sm"
                data-bs-toggle="modal"
                data-bs-target="#modalReclamo">
            <i class="fa-solid fa-plus"></i> Nuevo Reclamo
        </button>

        <button class="btn btn-warning btn-sm" id="btnEditar" disabled>
            <i class="fa-solid fa-pen"></i> Editar
        </button>

        <button class="btn btn-danger btn-sm" id="btnEliminar" disabled>
            <i class="fa-solid fa-trash"></i> Eliminar
        </button>

    </div>
</div>
{% endblock %}
