{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ingreso - GMVM</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    background: linear-gradient(135deg,#0E2AA1,#4ca1af);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family: Arial, sans-serif;
}

.login-card{
    width:380px;
    border-radius:12px;
}

.login-icon{
    font-size:40px;
    color:#4ca1af;
}
form input{
    width:100%;
}
.logo-login{
    width:130px;
    margin-bottom:10px;
}

</style>

</head>

<body>

<div class="card shadow-lg login-card">

    <div class="card-body p-4">

        <div class="text-center mb-4">
            <!--i class="fa-solid fa-city login-icon"></i-->
            <img src="{% static 'img/logo_valle_maria_1.png' %}" class="logo-login">

           <div class="text-center mb-3">
                <h3 class="fw-bold text-primary mb-1">GMVM</h3>
                <div class="text-secondary small">
                    Sistema de Gestión
                </div>
                <div class="text-muted small">
                    Municipalidad de Valle María
                </div>

            </div>
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Usuario</label>
                {{ form.username }}
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                {{ form.password }}
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-right-to-bracket"></i>
                    Ingresar
                </button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
