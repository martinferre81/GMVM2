{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ingreso - GMVM</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Iceland&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
    background: linear-gradient(135deg,#0E2AA1,#4ca1af);
    font-family: "Iceland", sans-serif;
    font-weight: 400;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family: Arial, sans-serif;
}

.login-card{
    font-family: "Iceland", sans-serif;
    font-weight: 750;
    width:380px;
    border-radius:12px;
}

.login-icon{
    font-size:40px;
    color:#4ca1af;
}
.form-control{
    width:100%;
}
.logo-login{
    width:130px;
    margin-bottom:10px;
}

.login-card{
    width:380px;
    border-radius:14px;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(8px);
    border:1px solid rgba(255,255,255,0.4);
}

.logo-login{
    width:80px;
    margin-bottom:10px;
    animation: flotar 4s ease-in-out infinite;
}

@keyframes flotar{
    0%{transform:translateY(0px)}
    50%{transform:translateY(-6px)}
    100%{transform:translateY(0px)}
}

</style>

</head>

<body>

<div class="card shadow-lg login-card">

    <div class="card-body p-4">

        <div class="text-center mb-4">
            <!--i class="fa-solid fa-city login-icon"></i-->
            <img src="{% static 'img/logo_valle_maria_1.png' %}" class="logo-login">

           <div class="text-center mb-3">
                <h3 class="fw-bold mb-1" style="color:#00388A">GMVM</h3>
                <div class="text-secondary small">
                    Sistema de Gestión
                </div>
                <div class="text-muted small">
                    Municipalidad de Valle María
                </div>

            </div>
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Usuario</label>
                {{ form.username }}
            </div>

            <div class="mb-4">
                <label class="form-label">Contraseña</label>

                <div class="input-group">
                    {{ form.password }}

                    <span class="input-group-text" id="togglePassword" style="cursor:pointer">
                        <i class="fa-solid fa-eye"></i>
                    </span>
                </div>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-right-to-bracket"></i>
                    Ingresar
                </button>
            </div>

        </form>

    </div>
</div>

<script>
const togglePassword = document.querySelector("#togglePassword");
const password = document.querySelector("#id_password");

togglePassword.addEventListener("click", function () {
    const type = password.getAttribute("type") === "password" ? "text" : "password";
    password.setAttribute("type", type);
    this.querySelector("i").classList.toggle("fa-eye-slash");
});
</script>

</body>
</html>
