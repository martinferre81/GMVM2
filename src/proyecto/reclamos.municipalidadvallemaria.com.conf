# Esto indica a Django que la solicitud viene por HTTPS
RequestHeader set X-Forwarded-Proto "https"
CustomLog domlogs/cabana-access_log combined
LogFormat "%{%s}t %B ." bytes_count
CustomLog domlogs/cabana-bytes_log bytes_count
#ScriptAlias /cgi-bin/ /home/cabana/public_html/reclamos/cgi-bin/

#LogSQLTransferLogTable cabana
#LogSQLTransferLogFormat AbHhMmRSsTtUuvio

SuexecUserGroup cabana cabana
