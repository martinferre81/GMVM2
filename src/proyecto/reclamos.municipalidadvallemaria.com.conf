<VirtualHost *:80>
ServerName www.reclamos.municipalidadvallemaria.com
ServerAlias reclamos.municipalidadvallemaria.com

ProxyPreserveHost On
ProxyPass / http://127.0.0.1:8000/
ProxyPassReverse / http://127.0.0.1:8000/

# Indica a Django que viene por HTTP
RequestHeader set X-Forwarded-Proto "http"

# Opcional: forzar Django a usar este host
RequestHeader set Host "reclamos.municipalidadvallemaria.com"
</VirtualHost>

<IfDefine SSL>
<VirtualHost *:443>
DocumentRoot /home/cabana/public_html/reclamos
ServerName www.reclamos.municipalidadvallemaria.com
ServerName www.reclamos.municipalidadvallemaria.com
ServerAlias reclamos.municipalidadvallemaria.com

