SSLCertificateKeyFile /opt/apache/conf/ssl.key/1111wildcard.municipalidadvallemaria.com.key
CustomLog "/opt/apache/domlogs/ssl_1111wildcard.municipalidadvallemaria.com-access_log" "%t %h %{SSL_PROTOCOL}x %{SSL_CIPHER}x \"%r\" %b"

SetEnvIf User-Agent ".*MSIE.*" nokeepalive ssl-unclean-shutdown
 
